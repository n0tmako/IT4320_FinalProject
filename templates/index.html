{% extends "base.html" %}

{% block title %}Bus Reservation - Main Menu{% endblock %}

{% block content %}
<section class="panel panel--centered" aria-label="Main Menu">
  <div class="panel__header">
    <div class="panel__title">Main Menu</div>
  </div>

  <div class="menu-container">
    <div class="menu-description">
      Welcome to the Bus Reservation System. Choose an option below to get started.
    </div>

    <div class="actions">
      <a href="{{ url_for('reserve') }}" class="btn btn--primary">
        Reserve a Seat
      </a>
      <a href="{{ url_for('admin_login') }}" class="btn btn--secondary">
        Admin Login
      </a>
    </div>
  </div>
</section>
{% endblock %}
